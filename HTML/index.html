<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .internal-box {
            background-color: lightblue;
            padding: 10px;
            margin: 10px;
            border: 2px solid blue;
        }
    </style>
</head>
<body>
    <h1>Hello!</h1>
    <p>This is my first webpage.</p>

    <!-- CSS EXAMPLES -->
    <h2>1. Inline CSS</h2>
    <p style="color: red; font-size: 18px;">This text is red (Inline CSS)</p>
    
    <h2>2. Internal CSS</h2>
    <div class="internal-box">
        This box uses Internal CSS
    </div>
    
    <h2>3. External CSS</h2>
    <div class="external-box">
        This box uses External CSS (styles.css file)
    </div>

    <!-- STUDENT TABLE -->
    <h2>Student Table</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Raj</td>
            <td>12</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Priya</td>
            <td>11</td>
            <td>B</td>
        </tr>
        <tr>
            <td>Arjun</td>
            <td>12</td>
            <td>A</td>
        </tr>
    </table>

    <!-- SIGN UP FORM -->
    <h2>Sign Up Form</h2>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">
        <br><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">
        <br><br>

        <label>Age:</label>
        <input type="number" placeholder="Enter your age">
        <br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
